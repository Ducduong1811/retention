<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf6f1;
    font-family: 'DM Sans', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .flywheel-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  #flywheelChart {
    width: 520px;
    height: 520px;
    flex-shrink: 0;
    position: relative;
  }

  .flywheel-hint {
    font-size: 10px;
    color: #a89888;
    text-align: center;
    margin-top: 2px;
  }

  /* ── Connector line between chart and panel ── */
  #flywheelConnector {
    position: absolute;
    left: 520px;
    top: 50%;
    width: 12px;
    height: 2px;
    opacity: 0;
    transition: opacity 0.35s ease;
    overflow: visible;
  }

  /* ── Detail panel ── */
  .flywheel-detail-panel {
    width: 320px;
    min-height: 180px;
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 14px;
    padding: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease, transform 0.35s ease;
    transform: translateX(16px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    overflow: hidden;
    font-family: 'DM Sans', sans-serif;
    flex-shrink: 0;
  }
  .flywheel-detail-panel.active {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(0);
  }

  .fw-header {
    padding: 14px 18px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .fw-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .fw-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: #fff;
  }
  .fw-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 1.5px;
  }
  .fw-close {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    background: transparent;
    color: #6b5e54;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }
  .fw-close:hover {
    background: rgba(0,0,0,0.04);
    color: #2c2520;
  }

  .fw-body {
    padding: 10px 18px 16px;
  }
  .fw-effect {
    font-size: 10.5px;
    color: #6b5e54;
    margin-bottom: 10px;
    line-height: 1.5;
    font-style: italic;
    padding: 7px 11px;
    background: rgba(0,0,0,0.02);
    border-radius: 7px;
    border-left: 3px solid;
  }

  .fw-card {
    background: rgba(0,0,0,0.015);
    border: 1px solid rgba(0,0,0,0.05);
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  .fw-card:last-child { margin-bottom: 0; }
  .fw-card:hover {
    background: rgba(0,0,0,0.035);
    border-color: rgba(0,0,0,0.08);
  }
  .fw-card-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 11.5px;
    margin-bottom: 3px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .fw-card-name .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .fw-card-desc {
    font-size: 10px;
    color: #6b5e54;
    line-height: 1.5;
    padding-left: 11px;
  }

  .flywheel-seg {
    transition: opacity 0.2s;
    cursor: pointer;
  }
  .flywheel-seg.dimmed { opacity: 0.25 !important; }
  .flywheel-seg.active-seg { opacity: 1 !important; }

  @keyframes flywheel-pulse {
    0%, 100% { opacity: 0.12; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="flywheel-wrapper">
  <div>
    <div id="flywheelChart"></div>
    <!-- <div class="flywheel-hint">Click a segment to explore</div> -->
  </div>

  <!-- Connector SVG -->
  <svg id="flywheelConnector" width="12" height="2" style="position:absolute; left:520px; top:50%; opacity:0; transition:opacity 0.35s;">
    <line x1="0" y1="1" x2="12" y2="1" stroke="#d4a24e" stroke-width="2"/>
  </svg>

  <!-- Detail panel -->
  <div id="flywheelPanel" class="flywheel-detail-panel">
    <div class="fw-body" style="padding:24px; color:#a89888; font-size:13px;">
      Select a segment to explore.
    </div>
  </div>
</div>

<script>
(function initFlywheel() {
  if (typeof d3 === 'undefined') {
    setTimeout(initFlywheel, 100);
    return;
  }

  const T = {
    bg:         '#faf6f1',
    bgInner:    '#f3ece2',
    fgDark:     '#2c2520',
    fgSoft:     'rgba(44,37,32,0.45)',
    shadow:     'rgba(0,0,0,0.1)',
    segStroke:  'rgba(0,0,0,0.08)',
    ring:       '#d4a24e',
    ringOp:     0.3,
    ringGlow:   0.1,
    arrow:      '#d4a24e',
    arrowOp:    0.5,
    vennOp:     0.18,
    vennStroke: 0.3,
    vennText:   '#2c2520',
    effectStr:  '#2c2520',
  };

  const W = 520, H = 520, CX = W/2, CY = H/2;
  const el = document.getElementById('flywheelChart');
  if (!el || el.querySelector('svg')) return;

  const svg = d3.select('#flywheelChart')
    .append('svg')
    .attr('viewBox', `0 0 ${W} ${H}`)
    .attr('width', '100%')
    .attr('height', '100%');

  const defs = svg.append('defs');
  const shadow = defs.append('filter').attr('id','fw-shadow')
    .attr('x','-15%').attr('y','-15%').attr('width','130%').attr('height','130%');
  shadow.append('feDropShadow')
    .attr('dx',0).attr('dy',2).attr('stdDeviation',4)
    .attr('flood-color', T.shadow);

  const segments = [
    { label:'ONBOARD', sub:'Referral & Rebates', num:'1', color:'#d4a24e',
      effect:'Viral growth → new users enter via referrals → engage in Earn/Launchpool → refer others.',
      programs:[
        {name:'Referral Lite',desc:'One-time rebates ($100–$1,000) for inviting friends.'},
        {name:'Referral Pro',desc:'Ongoing commissions (up to 50% on trading fees).'},
        {name:'Learn&Earn',desc:'Complete courses and quizzes to earn rewards'}
      ]},
    { label:'EARN', sub:'Hold & Yield', num:'2', color:'#7a937e',
      effect:'Idle funds stay on-platform → higher TVL → qualifies for airdrops.',
      programs:[
        {name:'Simple Earn / Staking',desc:'Earn APR/APY (3–400%+) on 180+ assets. Flexible or Locked.'},
        {name:'Dual Investment',desc:'Conditional buy/sell at target prices with enhanced yields.'},
        {name:'Yield Arena',desc:'Limited-time campaigns with boosted yields and $1M+ reward pools.'}
      ]},
    { label:'LAUNCH', sub:'Stake & Farm', num:'3', color:'#1A85D6',
      effect:'Free tokens drive trading → post-listing volume spikes.',
      programs:[
        {name:'Launchpool',desc:'Stake BNB/FDUSD → farm new tokens proportionally.'},
        {name:'Megadrop',desc:'Lock BNB + Web3 quests → earn points for exclusive airdrops.'},
        {name:'Alpha Points',desc:'Daily points from balances & trades → unlock airdrops, TGEs.'}
      ]},
    { label:'TRADE', sub:'Compete & Win', num:'4', color:'#c0623a',
      effect:'Spikes activity → habitual trading → VIP tier progress.',
      programs:[
        {name:'Trading Competitions',desc:'Prizes (200+ BNB) for top volume or ROI.'},
        {name:'Tournaments',desc:'Bracket-style events with progressive prizes.'},
        {name:'Seasonal Events',desc:'Daily challenges, $750K+ reward pools for logins & tasks.'}
      ]},
    { label:'CREATE', sub:'Content & Community', num:'5', color:'#9B6FD4',
      effect:'Creators promote projects → attracts new users → platform buzz.',
      programs:[
        {name:'CreatorPad',desc:'Earn tokens and commissions (up to 50%) via content.'},
        {name:'Binance Square',desc:'Campaign tasks, leaderboards → earn token rewards.'},
        {name:'Community Campaigns',desc:'Task-based missions with tiered prize pools.'}
      ]},
    { label:'REFER', sub:'Viral Growth Loop', num:'6', color:'#D97700',
      effect:'Refer friends → earn commissions → new users enter cycle → exponential growth.',
      programs:[
        {name:'Referral Commissions',desc:'Up to 50% ongoing commission on referred users\' fees.'},
        {name:'VIP / Loyalty Tiers',desc:'Lower fees, exclusive perks for high-volume traders and BNB holders.'},
        {name:'BNB Cross-Boosts',desc:'BNB holding multiplies rewards across all programs.'}
      ]}
  ];

  const vennCircles = [
    {label:'BNB\nHolding', color:'#d4a24e', cx:0, cy:-25},
    {label:'Points\nSystems', color:'#1A85D6', cx:-24, cy:17},
    {label:'VIP\nTiers', color:'#9B6FD4', cx:24, cy:17}
  ];

  const g = svg.append('g').attr('transform',`translate(${CX},${CY})`);
  const n = segments.length, outerR = 215, innerR = 145, midR = (outerR+innerR)/2;
  const gap = 0.05, segAngle = (2*Math.PI - n*gap)/n, arrowTip = 16;
  let activeIndex = -1;
  const segPaths = [];

  segments.forEach((seg, i) => {
    const startA = -Math.PI/2 + i*(segAngle+gap), endA = startA + segAngle;
    const preArrow = endA - arrowTip/outerR;
    const path = d3.path();
    path.moveTo(outerR*Math.cos(startA), outerR*Math.sin(startA));
    path.arc(0, 0, outerR, startA, preArrow, false);
    path.lineTo(midR*Math.cos(endA), midR*Math.sin(endA));
    path.lineTo(innerR*Math.cos(preArrow), innerR*Math.sin(preArrow));
    path.arc(0, 0, innerR, preArrow, startA, true);
    path.closePath();

    const pathEl = g.append('path')
      .attr('class', 'flywheel-seg')
      .attr('d', path.toString())
      .attr('fill', seg.color)
      .attr('opacity', 0.85)
      .attr('filter', 'url(#fw-shadow)')
      .attr('stroke', T.segStroke)
      .attr('stroke-width', 0.5);
    segPaths.push(pathEl);

    pathEl.on('click', () => fwToggle(i));
    pathEl.on('mouseenter', function() { if (activeIndex === -1) d3.select(this).attr('opacity', 1); });
    pathEl.on('mouseleave', function() { if (activeIndex === -1) d3.select(this).attr('opacity', 0.85); });

    const labelA = (startA + endA) / 2;
    const lx = midR * Math.cos(labelA), ly = midR * Math.sin(labelA);
    let rot = (labelA * 180/Math.PI) + 90;
    if (rot > 90 && rot < 270) rot += 180;

    g.append('text').attr('x', lx).attr('y', ly - 5)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('transform', `rotate(${rot},${lx},${ly})`)
      .attr('fill', T.fgDark)
      .attr('font-family', 'Outfit, sans-serif')
      .attr('font-size', '14px').attr('font-weight', '900').attr('letter-spacing', '1.5px')
      .style('pointer-events', 'none')
      .text(seg.label);

    g.append('text').attr('x', lx).attr('y', ly + 9)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('transform', `rotate(${rot},${lx},${ly})`)
      .attr('fill', T.fgSoft)
      .attr('font-size', '7.5px').attr('font-weight', '500')
      .style('pointer-events', 'none')
      .text(seg.sub);

    const numA = startA + 0.22;
    const nx = (innerR + 14) * Math.cos(numA), ny = (innerR + 14) * Math.sin(numA);
    g.append('circle').attr('cx', nx).attr('cy', ny).attr('r', 10)
      .attr('fill', T.bg).attr('stroke', seg.color).attr('stroke-width', 2)
      .style('pointer-events', 'none');
    g.append('text').attr('x', nx).attr('y', ny)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
      .attr('fill', seg.color)
      .attr('font-family', 'Outfit, sans-serif').attr('font-size', '9px').attr('font-weight', '700')
      .style('pointer-events', 'none')
      .text(seg.num);
  });

  // Gap arrows
  segments.forEach((_, i) => {
    const startA = -Math.PI/2 + i*(segAngle+gap), gapMid = startA - gap/2;
    const ax = midR*Math.cos(gapMid), ay = midR*Math.sin(gapMid), s = 4;
    g.append('polygon')
      .attr('points', `${ax},${ay} ${ax+s*Math.cos(gapMid-0.5)},${ay+s*Math.sin(gapMid-0.5)} ${ax+s*Math.cos(gapMid+0.5)},${ay+s*Math.sin(gapMid+0.5)}`)
      .attr('fill', T.arrow).attr('opacity', T.arrowOp);
  });

  // Inner ring
  g.append('circle').attr('r', innerR-4).attr('fill', 'none')
    .attr('stroke', T.ring).attr('stroke-width', 2).attr('opacity', T.ringOp);
  g.append('circle').attr('r', innerR-4).attr('fill', 'none')
    .attr('stroke', T.ring).attr('stroke-width', 5).attr('opacity', T.ringGlow)
    .style('animation', 'flywheel-pulse 3s ease-in-out infinite');
  g.append('circle').attr('r', innerR-7).attr('fill', T.bgInner);

  // Venn
  const vR = 42;
  vennCircles.forEach(v => {
    g.append('circle').attr('cx', v.cx).attr('cy', v.cy).attr('r', vR)
      .attr('fill', v.color).attr('opacity', T.vennOp)
      .attr('stroke', v.color).attr('stroke-width', 1.5).attr('stroke-opacity', T.vennStroke);
  });
  vennCircles.forEach(v => {
    const lines = v.label.split('\n');
    const t = g.append('text').attr('x', v.cx).attr('y', v.cy - (lines.length-1)*5)
      .attr('text-anchor', 'middle').attr('fill', T.vennText)
      .attr('font-family', 'Outfit, sans-serif').attr('font-size', '9px').attr('font-weight', '700');
    lines.forEach((l, li) => { t.append('tspan').attr('x', v.cx).attr('dy', li === 0 ? 0 : 12).text(l); });
  });

  // ─── Panel logic ───
  const panel = document.getElementById('flywheelPanel');
  const connector = document.getElementById('flywheelConnector');

  function fwToggle(i) {
    if (activeIndex === i) { fwClose(); return; }
    activeIndex = i;
    const seg = segments[i];
    segPaths.forEach((p, j) => { p.classed('dimmed', j !== i); p.classed('active-seg', j === i); });

    panel.innerHTML = `
      <div class="fw-header">
        <div class="fw-header-left">
          <div class="fw-num" style="background:${seg.color}">${seg.num}</div>
          <div class="fw-title" style="color:${seg.color}">${seg.label}</div>
        </div>
        <button class="fw-close" onclick="document.dispatchEvent(new Event('fw-close'))">✕</button>
      </div>
      <div class="fw-body">
        <div class="fw-effect" style="border-left-color:${seg.color}">
          <strong style="color:${T.effectStr}">Effect:</strong> ${seg.effect}
        </div>
        ${seg.programs.map(p => `
          <div class="fw-card">
            <div class="fw-card-name">
              <span class="dot" style="background:${seg.color}"></span>
              <span style="color:${seg.color}">${p.name}</span>
            </div>
            <div class="fw-card-desc">${p.desc}</div>
          </div>`).join('')}
      </div>`;

    panel.classList.add('active');
    connector.style.opacity = '1';
    connector.querySelector('line').setAttribute('stroke', seg.color);
  }

  function fwClose() {
    activeIndex = -1;
    panel.classList.remove('active');
    connector.style.opacity = '0';
    segPaths.forEach(p => { p.classed('dimmed', false); p.classed('active-seg', false); p.attr('opacity', 0.85); });
  }

  document.addEventListener('fw-close', fwClose);

  document.addEventListener('click', (e) => {
    if (activeIndex === -1) return;
    const wrapper = document.querySelector('.flywheel-wrapper');
    if (wrapper && !wrapper.contains(e.target)) fwClose();
  });
})();
</script>

</body>
</html>
